<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원제 애니 추천</title>
  <meta property="og:title" content="회원제 애니 추천">
  <meta property="og:description" content="애니를 평가하면 개인 하이브리드 추천을 보여줍니다.">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css', v='member-solid-bg-1') }}">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">애니메이션 추천 시스템 <span class="view-badge">조회수 {{ visit_count }}</span></p>
      <h1>애니 좀 봐주세요</h1>
      <div class="hero-actions">
        <a class="ghost-link" href="{{ url_for('anime_map') }}">애니 라이브러리 둘러보기</a>
      </div>
    </section>

    <section id="authPanel" class="auth-grid">
      <div class="auth-shell">
        <article id="loginCard" class="panel auth-card">
          <h2>로그인</h2>
          <input id="loginName" autocomplete="username" placeholder="아이디">
          <input id="loginPassword" autocomplete="current-password" type="password" placeholder="비밀번호">
          <button id="loginButton" class="primary">로그인</button>
          <div class="auth-switch">
            <button id="showRegisterButton" class="text-link" type="button">회원가입</button>
          </div>
        </article>

        <article id="registerCard" class="panel auth-card hidden">
          <h2>회원가입</h2>
          <input id="registerName" autocomplete="username" placeholder="아이디">
          <input id="registerPassword" autocomplete="new-password" type="password" placeholder="비밀번호">
          <button id="registerButton" class="primary">회원가입</button>
          <div class="auth-switch">
            <span>이미 계정이 있다면</span>
            <button id="showLoginButton" class="text-link" type="button">로그인</button>
          </div>
        </article>
      </div>
    </section>

    <section id="appPanel" class="hidden">
      <section class="panel member-bar">
        <div>
          <p class="eyebrow">내 추천 상태</p>
          <h2><span id="usernameLabel"></span>님</h2>
          <p id="ratingStatus" class="status"></p>
        </div>
        <button id="logoutButton">로그아웃</button>
      </section>

      <nav class="tab-bar" aria-label="추천 메뉴">
        <button id="recommendTabButton" class="tab-button active" type="button">추천 보기</button>
        <button id="ratingTabButton" class="tab-button" type="button">평가하기</button>
      </nav>

      <section class="tab-viewport">
        <div id="tabTrack" class="tab-track">
          <section id="recommendTab" class="tab-panel active" data-side="center">
            <section id="personalSection" class="panel">
              <h2>나를 위한 하이브리드 추천</h2>
              <p id="personalStatus" class="status"></p>
              <div id="personalGrid" class="grid"></div>
            </section>

            <section class="composer panel">
              <h2>콘텐츠 기반 추천</h2>
              <div class="search-row">
                <input id="contentSearchInput" autocomplete="off" placeholder="예: Naruto, Koe no Katachi, Made in Abyss">
                <button id="contentSearchButton">검색</button>
              </div>
              <div id="contentSearchResults" class="search-results"></div>
              <div class="selected-wrap">
                <h2>내가 본 애니</h2>
                <div id="contentSelectedList" class="chips empty">아직 선택한 애니가 없습니다.</div>
              </div>
              <div class="actions">
                <label>시청자 수 <input id="minMembers" type="number" value="5000" min="0" step="1000"></label>
                <label>추천 개수 <input id="topN" type="number" value="12" min="3" max="30"></label>
                <label class="toggle"><input id="avoidSameSeries" type="checkbox" checked> 같은 시리즈 제외</label>
                <button id="contentRecommendButton" class="primary">추천 만들기</button>
              </div>
              <p id="contentStatus" class="status"></p>
            </section>

            <section id="contentPreview" class="preview"></section>
          </section>

          <section id="ratingTab" class="tab-panel" data-side="right" aria-hidden="true">
            <section class="composer panel">
              <h2>애니 평가하기</h2>
              <div class="search-row">
                <input id="ratingSearchInput" autocomplete="off" placeholder="예: Naruto, Koe no Katachi, Made in Abyss">
                <button id="ratingSearchButton">검색</button>
              </div>
              <p class="status">검색한 애니에 1점부터 10점까지 평가해보세요.</p>
              <div id="ratingSearchResults" class="search-results"></div>
            </section>

            <section class="panel">
              <h2>내가 평가한 애니</h2>
              <div id="ratingList" class="rating-list"></div>
            </section>
          </section>
        </div>
      </section>
    </section>

    <p id="status" class="status"></p>
  </main>
  <script>
    window.RATING_THRESHOLD = {{ threshold }};
  </script>
  <script src="{{ url_for('static', filename='member_app.js', v='member-solid-bg-1') }}"></script>
</body>
</html>
